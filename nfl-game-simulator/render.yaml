services:
  - type: web
    name: nba-factor-analysis
    runtime: python
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: NODE_VERSION
        value: "18"
